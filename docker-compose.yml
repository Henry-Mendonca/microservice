
version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: dsmd_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: payment
    ports:
      - "5432:5432"
    volumes:
      - dsmd_pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: 123456
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  dsmd_pgdata:
